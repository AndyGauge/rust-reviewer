name: Deploy mdBook to GitHub Pages

on:
  # Rebuild on any change to the book sources or its config.
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "book.toml"
      - ".github/workflows/deploy-book.yml"
  # Allow a manual run from the Actions tab.
  workflow_dispatch:

# Least privilege: read the repo, write Pages, mint the OIDC token deploy-pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: "0.5.3"
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/bin"
          url="https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -sSL "$url" | tar -xz -C "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"
      - name: Build the book
        run: mdbook build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
